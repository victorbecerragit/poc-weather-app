name: Deploy Astro UI

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build || (cat dist/ || true; exit 1)  # ← dump output on fail

      - name: Verify dist artifact  # ← NEW: debug
        run: |
          ls -la dist/
          du -sh dist/*

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5  # ← v5 for latest fixes
        with:
          path: ./dist  # ← explicit path

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
